version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: primetrade-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: primetrade
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: primetrade-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/primetrade?schema=public
      JWT_ACCESS_SECRET: default_super_secret_jwt_access_key_change_me_in_production
      CLIENT_ORIGIN: "http://localhost"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && node dist/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: primetrade-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
